<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Folder FLIP Transition Demo - Stable & Smooth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --bg-grid: #0d0d0d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8a8a8a;
            --text-muted: #4a4a4a;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --active-bg: rgba(10, 10, 10, 0.95);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.03) 0%, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-family: monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Backdrop Blur Overlay - Optimized performance (static blur, transition opacity only) */
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        .backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 120px);
            gap: 3rem;
            justify-content: center;
        }

        /* Folder Wrapper - MUST have fixed dimensions matching folder + title
           to prevent layout shifts when the folder transitions to position: fixed */
        .folder-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 120px;
            height: 150px;
            position: relative;
        }

        /* Folder Container - Closed State */
        .folder {
            width: 110px;
            height: 110px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 26px;
            padding: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transform-origin: center center;
            z-index: 5;
            transition: border-color 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .folder-wrapper:hover .folder {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px var(--accent-glow);
        }

        /* Folder Grid of Mini Icons (Stable layout during FLIP - no gap transitions) */
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }

        /* App Icon */
        .app-icon {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.15rem;
            aspect-ratio: 1;
            position: relative;
            transform-origin: center center;
            box-sizing: border-box;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* App Label under Icon (shown in expanded state) */
        .app-label {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: monospace;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        /* Folder Title under the Folder Card */
        .folder-title {
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        .folder-wrapper:hover .folder-title {
            color: var(--text-primary);
        }

        /* ============================================
           ACTIVE (EXPANDED) FOLDER STATES
           ============================================ */
        
        /* Modern viewport centering using inset & margin: auto 
           Avoids transform conflicts in CSS */
        .folder.active {
            position: fixed;
            inset: 0;
            margin: auto;
            width: 320px;
            height: 320px;
            border-radius: 40px;
            background: var(--active-bg);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.85), 
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 50px rgba(255, 255, 255, 0.02);
            z-index: 100;
            cursor: default;
            padding: 24px;
        }

        /* Swaps layout properties instantly on active state */
        .folder.active .folder-grid {
            grid-template-columns: repeat(2, 100px);
            justify-content: center;
            align-content: center;
            gap: 32px;
        }

        /* Expanded app icons */
        .folder.active .app-icon {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 2.2rem;
            cursor: pointer;
        }

        .folder.active .app-icon:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Reveal labels when active */
        .folder.active .app-label {
            opacity: 1;
            transition-delay: 0.15s;
        }

        /* Hide the folder's mini-title when active */
        .folder-wrapper.active-parent .folder-title {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="backdrop" id="backdrop"></div>
    
    <div class="container">
        <h1>Directory FLIP Demo</h1>
        <p class="subtitle">Vanilla JS • Smooth Easing • No Layout Jitter</p>

        <div class="grid-container">
            <!-- Folder 1: Languages -->
            <div class="folder-wrapper" id="wrap-languages">
                <div class="folder" id="languages">
                    <div class="folder-grid">
                        <div class="app-icon">🐍<span class="app-label">Python</span></div>
                        <div class="app-icon">🇨<span class="app-label">C Lang</span></div>
                        <div class="app-icon">🗄️<span class="app-label">SQL DB</span></div>
                        <div class="app-icon">🐚<span class="app-label">Bash</span></div>
                    </div>
                </div>
                <div class="folder-title">Languages</div>
            </div>
            
            <!-- Folder 2: Frameworks -->
            <div class="folder-wrapper" id="wrap-frameworks">
                <div class="folder" id="frameworks">
                    <div class="folder-grid">
                        <div class="app-icon">⚡<span class="app-label">FastAPI</span></div>
                        <div class="app-icon">🐎<span class="app-label">Django</span></div>
                        <div class="app-icon">🐳<span class="app-label">Docker</span></div>
                        <div class="app-icon">💾<span class="app-label">Redis</span></div>
                    </div>
                </div>
                <div class="folder-title">Frameworks</div>
            </div>
        </div>
    </div>

    <script>
        const backdrop = document.getElementById('backdrop');
        const folders = document.querySelectorAll('.folder');
        
        let activeFolder = null;
        let isAnimating = false;

        folders.forEach(folder => {
            folder.addEventListener('click', (e) => {
                // If folder is already active, we clicked an icon inside it, or an animation is running
                if (folder.classList.contains('active') || isAnimating) return;
                
                e.stopPropagation();
                openFolder(folder);
            });
        });

        // Close when clicking backdrop
        backdrop.addEventListener('click', () => {
            if (activeFolder && !isAnimating) {
                closeFolder(activeFolder);
            }
        });

        function openFolder(folder) {
            isAnimating = true;
            activeFolder = folder;
            const parent = folder.parentElement;
            const icons = folder.querySelectorAll('.app-icon');
            
            parent.classList.add('active-parent');
            backdrop.classList.add('active');

            // 1. FIRST: Get initial screen bounding rects before styling shifts
            const firstFolderRect = folder.getBoundingClientRect();
            const firstIconRects = Array.from(icons).map(icon => icon.getBoundingClientRect());

            // 2. STATE CHANGE: Shift element into active modal styles (takes it out of flow, centers it via inset/margin)
            folder.classList.add('active');

            // 3. LAST: Get final screen bounding rects in the centered modal state
            const lastFolderRect = folder.getBoundingClientRect();
            const lastIconRects = Array.from(icons).map(icon => icon.getBoundingClientRect());

            // 4. INVERT: Calculate offsets and scales based on element centers to prevent layout drift
            const scale_p = firstFolderRect.width / lastFolderRect.width;
            
            const C_p_first = { 
                x: firstFolderRect.left + firstFolderRect.width / 2, 
                y: firstFolderRect.top + firstFolderRect.height / 2 
            };
            const C_p_last = { 
                x: lastFolderRect.left + lastFolderRect.width / 2, 
                y: lastFolderRect.top + lastFolderRect.height / 2 
            };

            const folderDeltaX = C_p_first.x - C_p_last.x;
            const folderDeltaY = C_p_first.y - C_p_last.y;

            // Apply parent invert transform instantly (no transition)
            folder.style.transform = `translate(${folderDeltaX}px, ${folderDeltaY}px) scale(${scale_p})`;
            folder.style.transition = 'none';

            // Apply child icon invert transforms instantly (no transition)
            icons.forEach((icon, i) => {
                const firstRect = firstIconRects[i];
                const lastRect = lastIconRects[i];

                const C_c_first = { 
                    x: firstRect.left + firstRect.width / 2, 
                    y: firstRect.top + firstRect.height / 2 
                };
                const C_c_last = { 
                    x: lastRect.left + lastRect.width / 2, 
                    y: lastRect.top + lastRect.height / 2 
                };

                const scale_c_initial = firstRect.width / lastRect.width;
                const scale_c = scale_c_initial / scale_p;

                // Nested FLIP Math: Accounting for parent's scaling and coordinate offsets
                const translate_c_x = (C_c_first.x - C_p_first.x) / scale_p - (C_c_last.x - C_p_last.x);
                const translate_c_y = (C_c_first.y - C_p_first.y) / scale_p - (C_c_last.y - C_p_last.y);

                icon.style.transform = `translate(${translate_c_x}px, ${translate_c_y}px) scale(${scale_c})`;
                icon.style.transition = 'none';
            });

            // Force browser layout recalculation/reflow
            folder.offsetHeight;

            // 5. PLAY: Animate back to identity (transform: none) using smooth Apple-inspired easing
            const transitionStyle = 'transform 0.48s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.48s ease, border-radius 0.48s ease, box-shadow 0.48s ease';
            folder.style.transition = transitionStyle;
            folder.style.transform = '';

            const iconTransitionStyle = 'transform 0.48s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease, border-radius 0.48s cubic-bezier(0.16, 1, 0.3, 1)';
            icons.forEach(icon => {
                icon.style.transition = iconTransitionStyle;
                icon.style.transform = '';
            });

            // Clean up transitions and inline styles after animation completes
            const onTransitionEnd = (e) => {
                if (e.target === folder && e.propertyName === 'transform') {
                    folder.style.transition = '';
                    folder.style.transform = '';
                    icons.forEach(icon => {
                        icon.style.transition = '';
                        icon.style.transform = '';
                    });
                    folder.removeEventListener('transitionend', onTransitionEnd);
                    isAnimating = false;
                }
            };
            folder.addEventListener('transitionend', onTransitionEnd);
        }

        function closeFolder(folder) {
            isAnimating = true;
            const parent = folder.parentElement;
            const icons = folder.querySelectorAll('.app-icon');

            backdrop.classList.remove('active');
            parent.classList.remove('active-parent');

            // 1. FIRST: Get current bounds (centered modal state)
            const firstFolderRect = folder.getBoundingClientRect();
            const firstIconRects = Array.from(icons).map(icon => icon.getBoundingClientRect());

            // 2. STATE CHANGE: Return to small grid slot layout
            folder.classList.remove('active');

            // 3. LAST: Get final target bounds in standard grid slot
            const lastFolderRect = folder.getBoundingClientRect();
            const lastIconRects = Array.from(icons).map(icon => icon.getBoundingClientRect());

            // 4. INVERT: Calculate offsets based on element centers
            const scale_p = firstFolderRect.width / lastFolderRect.width;
            
            const C_p_first = { 
                x: firstFolderRect.left + firstFolderRect.width / 2, 
                y: firstFolderRect.top + firstFolderRect.height / 2 
            };
            const C_p_last = { 
                x: lastFolderRect.left + lastFolderRect.width / 2, 
                y: lastFolderRect.top + lastFolderRect.height / 2 
            };

            const folderDeltaX = C_p_first.x - C_p_last.x;
            const folderDeltaY = C_p_first.y - C_p_last.y;

            // Apply parent invert transform instantly
            folder.style.transform = `translate(${folderDeltaX}px, ${folderDeltaY}px) scale(${scale_p})`;
            folder.style.transition = 'none';

            // Apply child icon invert transforms instantly
            icons.forEach((icon, i) => {
                const firstRect = firstIconRects[i];
                const lastRect = lastIconRects[i];

                const C_c_first = { 
                    x: firstRect.left + firstRect.width / 2, 
                    y: firstRect.top + firstRect.height / 2 
                };
                const C_c_last = { 
                    x: lastRect.left + lastRect.width / 2, 
                    y: lastRect.top + lastRect.height / 2 
                };

                const scale_c_initial = firstRect.width / lastRect.width;
                const scale_c = scale_c_initial / scale_p;

                const translate_c_x = (C_c_first.x - C_p_first.x) / scale_p - (C_c_last.x - C_p_last.x);
                const translate_c_y = (C_c_first.y - C_p_first.y) / scale_p - (C_c_last.y - C_p_last.y);

                icon.style.transform = `translate(${translate_c_x}px, ${translate_c_y}px) scale(${scale_c})`;
                icon.style.transition = 'none';
            });

            // Force layout reflow
            folder.offsetHeight;

            // 5. PLAY: Animate folder back to standard size/position
            const transitionStyle = 'transform 0.48s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.48s ease, border-radius 0.48s ease, box-shadow 0.48s ease';
            folder.style.transition = transitionStyle;
            folder.style.transform = '';

            const iconTransitionStyle = 'transform 0.48s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease, border-radius 0.48s cubic-bezier(0.16, 1, 0.3, 1)';
            icons.forEach(icon => {
                icon.style.transition = iconTransitionStyle;
                icon.style.transform = '';
            });

            // Clean up transitions and inline styles after closing completes
            const onTransitionEnd = (e) => {
                if (e.target === folder && e.propertyName === 'transform') {
                    folder.style.transition = '';
                    folder.style.transform = '';
                    icons.forEach(icon => {
                        icon.style.transition = '';
                        icon.style.transform = '';
                    });
                    folder.removeEventListener('transitionend', onTransitionEnd);
                    isAnimating = false;
                    activeFolder = null;
                }
            };
            folder.addEventListener('transitionend', onTransitionEnd);
        }
    </script>
</body>
</html>
